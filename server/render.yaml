services:
  - type: web
    name: smart-compliance-api
    env: node
    plan: starter
    buildCommand: |
      cd server
      npm install
      npx prisma migrate deploy --schema ../database/prisma/schema.prisma
      npm run build
    startCommand: |
      cd server
      node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend-domain
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false

